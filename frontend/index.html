<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0d1117" />
    <title>Watchtower NOC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Driver.js for guided tour -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/driver.js@1.3.1/dist/driver.css" />
    <script src="https://cdn.jsdelivr.net/npm/driver.js@1.3.1/dist/driver.js.iife.js"></script>
    <style>
      /* Custom driver.js theme to match Watchtower dark theme */
      .driver-popover {
        background-color: #161b22 !important;
        border: 1px solid #30363d !important;
        color: #c9d1d9 !important;
        border-radius: 12px !important;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4) !important;
      }
      .driver-popover .driver-popover-title {
        color: #f0f6fc !important;
        font-size: 16px !important;
        font-weight: 600 !important;
      }
      .driver-popover .driver-popover-description {
        color: #8b949e !important;
        font-size: 14px !important;
        line-height: 1.6 !important;
      }
      .driver-popover .driver-popover-progress-text {
        color: #58a6ff !important;
      }
      .driver-popover-prev-btn {
        background-color: #21262d !important;
        color: #c9d1d9 !important;
        border: 1px solid #30363d !important;
        border-radius: 6px !important;
        text-shadow: none !important;
      }
      .driver-popover-prev-btn:hover {
        background-color: #30363d !important;
      }
      .driver-popover-next-btn {
        background-color: #58a6ff !important;
        color: #0d1117 !important;
        border: none !important;
        border-radius: 6px !important;
        text-shadow: none !important;
      }
      .driver-popover-next-btn:hover {
        background-color: #79c0ff !important;
      }
      .driver-popover-close-btn {
        color: #8b949e !important;
      }
      .driver-popover-close-btn:hover {
        color: #c9d1d9 !important;
      }
      .driver-popover .driver-popover-arrow-side-left.driver-popover-arrow,
      .driver-popover .driver-popover-arrow-side-right.driver-popover-arrow,
      .driver-popover .driver-popover-arrow-side-top.driver-popover-arrow,
      .driver-popover .driver-popover-arrow-side-bottom.driver-popover-arrow {
        border-color: #30363d !important;
      }
    </style>
  </head>
  <body class="bg-bg-primary text-text-primary font-sans">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
