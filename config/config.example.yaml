# Watchtower Configuration
# This file contains sensitive credentials - do not commit to version control

# Authentication
auth:
  admin_user: admin
  admin_password_hash: ""
  # Generated on startup if left as a known placeholder.
  jwt_secret: "change-this-to-a-random-secret-in-production"
  session_hours: 24

# Data Sources
data_sources:
  librenms:
    url: ""
    api_key: ""
    webhook_token: ""

  netdisco:
    url: ""
    api_key: ""
    username: ""
    password: ""

  proxmox:
    url: ""
    token_id: ""
    token_secret: ""
    verify_ssl: false
    additional: []
    # Example:
    # additional:
    #   - name: "secondary"
    #     url: "https://proxmox2.local:8006"
    #     token_id: "watchtower@pam!monitoring"
    #     token_secret: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
    #     verify_ssl: false

# Polling Intervals (seconds)
polling:
  device_status: 30
  device_stats: 60
  topology: 300
  interfaces: 60
  proxmox: 60

# Notifications
notifications:
  notify_on:
    - critical
  notify_on_recovery: true
  cooldown_minutes: 5

  channels:
    discord:
      enabled: false
      webhook_url: ""
      mention_role: "@here"

    pushover:
      enabled: false
      user_key: ""
      app_token: ""
      priority: 2
      retry: 30
      expire: 300

    email:
      enabled: false
      smtp_host: ""
      smtp_port: 587
      smtp_user: ""
      smtp_password: ""
      use_tls: true
      from_address: ""
      recipients: []
      subject_prefix: "[Watchtower]"

# InfluxDB Historical Data
# Run ./scripts/setup-influxdb.sh to set up the container and buckets
influxdb:
  url: "http://localhost:8086"
  token: ""
  # Set after provisioning InfluxDB
  org: "watchtower"
  bucket: "watchtower"
  enabled: false

# Alert Thresholds
alert_thresholds:
  defaults:
    cpu_warning: 80
    cpu_critical: 95
    memory_warning: 85
    memory_critical: 95
    interface_utilization_warning: 70
    interface_utilization_critical: 90
  overrides: {}

# LibreNMS Device Discovery
discovery:
  vm_subnets:
    - "10.2.50.0/24"
  include_types:
    - firewall
    - network
    - server
    - wireless
  auto_sync: false
  sync_interval: 3600
