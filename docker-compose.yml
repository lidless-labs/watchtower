version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: watchtower-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  influxdb:
    image: influxdb:2.7
    container_name: watchtower-influxdb
    restart: unless-stopped
    ports:
      - "127.0.0.1:8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${WATCHTOWER_INFLUXDB_USERNAME:-admin}
      # No working defaults for the password/token: compose refuses to start
      # if they are unset or empty, so a deployment can never inherit a
      # predictable admin credential. Generate with `openssl rand -hex 32`.
      DOCKER_INFLUXDB_INIT_PASSWORD: ${WATCHTOWER_INFLUXDB_PASSWORD:?set WATCHTOWER_INFLUXDB_PASSWORD in .env (openssl rand -hex 32)}
      DOCKER_INFLUXDB_INIT_ORG: watchtower
      DOCKER_INFLUXDB_INIT_BUCKET: watchtower
      DOCKER_INFLUXDB_INIT_RETENTION: 30d
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${WATCHTOWER_INFLUXDB_ADMIN_TOKEN:?set WATCHTOWER_INFLUXDB_ADMIN_TOKEN in .env (openssl rand -hex 32)}

volumes:
  redis-data:
  influxdb-data:
  influxdb-config:
