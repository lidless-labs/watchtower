version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: watchtower-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  influxdb:
    image: influxdb:2.7
    container_name: watchtower-influxdb
    restart: unless-stopped
    ports:
      - "127.0.0.1:8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${WATCHTOWER_INFLUXDB_USERNAME:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${WATCHTOWER_INFLUXDB_PASSWORD:-watchtower-admin}
      DOCKER_INFLUXDB_INIT_ORG: watchtower
      DOCKER_INFLUXDB_INIT_BUCKET: watchtower
      DOCKER_INFLUXDB_INIT_RETENTION: 30d
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${WATCHTOWER_INFLUXDB_ADMIN_TOKEN:-watchtower-dev-token}

volumes:
  redis-data:
  influxdb-data:
  influxdb-config:
