name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or ref to validate, for example v1.2.3"
        required: true

permissions:
  contents: read

jobs:
  validate-release:
    name: Validate release artifact
    runs-on: ubuntu-latest
    env:
      RELEASE_REF: ${{ github.event.inputs.ref || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Validate release ref
        run: |
          case "$RELEASE_REF" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "Release refs must look like v1.2.3, got: $RELEASE_REF" >&2
              exit 1
              ;;
          esac
          git rev-parse --verify HEAD

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Validate backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          ruff check app tests
          pytest -q

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate frontend
        working-directory: frontend
        run: |
          npm ci
          npm audit --audit-level=moderate
          npm run lint
          npm run test -- --run
          npm run build

      - name: Build source archive
        run: |
          mkdir -p dist
          git archive \
            --format=tar.gz \
            --prefix="watchtower-${RELEASE_REF}/" \
            --output="dist/watchtower-${RELEASE_REF}.tar.gz" \
            HEAD
          sha256sum "dist/watchtower-${RELEASE_REF}.tar.gz" > "dist/watchtower-${RELEASE_REF}.tar.gz.sha256"

      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: watchtower-${{ env.RELEASE_REF }}
          path: |
            dist/watchtower-${{ env.RELEASE_REF }}.tar.gz
            dist/watchtower-${{ env.RELEASE_REF }}.tar.gz.sha256
