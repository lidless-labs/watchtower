name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend (lint, type-check, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Lint (ruff)
        run: ruff check app

      - name: Type-check (mypy, advisory)
        run: mypy app
        continue-on-error: true  # advisory until codebase is baselined

      - name: Test (pytest)
        run: |
          if [ -d tests ] && find tests -name 'test_*.py' -print -quit | grep -q .; then
            pytest -q
          else
            echo "No tests yet, skipping pytest."
          fi

  frontend:
    name: Frontend (type-check, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Test (vitest)
        run: |
          if find src \( -name '*.test.ts' -o -name '*.test.tsx' \) -print -quit 2>/dev/null | grep -q .; then
            npx vitest run
          else
            echo "No tests yet, skipping vitest."
          fi

  audit:
    name: pip-audit (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit backend dependencies
        run: pip-audit -r backend/requirements.txt --strict
